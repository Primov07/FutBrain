<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>FutBrain – Публикации</title>
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="../img/logo.png" alt="FutBrain logo">
                <span>Админ панел</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html"><i class="fas fa-chart-line"></i> Табло</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Потребители</a></li>
                    <li class="active"><a href="posts.html"><i class="fas fa-file-alt"></i> Публикации</a></li>
                    <li><a href="players.html"><i class="fas fa-running"></i> Играчи</a></li>
                    <li><a href="comments.html"><i class="fas fa-comments"></i> Коментари</a></li>
                    <li><a href="replies.html"><i class="fas fa-reply-all"></i> Отговори</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../home.html"><i class="fas fa-sign-out-alt"></i> Към сайта</a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Търси публикация...">
                </div>
                <div class="admin-profile">
                    <span>Добре дошли, <strong>администратор</strong></span>
                    <img src="../img/logo.png" alt="Админ" class="admin-avatar">
                </div>
            </header>

            <div class="admin-content">
                <section class="data-section">
                    <div class="section-header">
                        <h2>Управление на публикации</h2>
                        <div class="header-actions">
                            <button class="btn-refresh" title="Обнови таблицата"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Автор</th>
                                    <th>Съдържание (откъс)</th>
                                    <th>Дата на публикуване</th>
                                    <th>Харесвания</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Ivan_Ivanov</td>
                                    <td>Днес беше страхотен ден за футбола...</td>
                                    <td>10.04.2024</td>
                                    <td>15</td>
                                    <td class="actions">
                                        <button class="btn-delete" title="Изтрий"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
