<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>FutBrain – Добави играч</title>
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <img src="../img/logo.png" alt="FutBrain logo">
                <span>Админ панел</span>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html"><i class="fas fa-chart-line"></i> Табло</a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> Потребители</a></li>
                    <li><a href="posts.html"><i class="fas fa-file-alt"></i> Публикации</a></li>
                    <li class="active"><a href="players.html"><i class="fas fa-running"></i> Играчи</a></li>
                    <li><a href="comments.html"><i class="fas fa-comments"></i> Коментари</a></li>
                    <li><a href="replies.html"><i class="fas fa-reply-all"></i> Отговори</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="../home.html"><i class="fas fa-sign-out-alt"></i> Към сайта</a>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Търси данни...">
                </div>
                <div class="admin-profile">
                    <span>Добре дошли, <strong>администратор</strong></span>
                    <img src="../img/logo.png" alt="Админ" class="admin-avatar">
                </div>
            </header>

            <div class="admin-content">
                <div class="section-header">
                    <h2>Добави нов играч</h2>
                </div>

                <div class="admin-form-container">
                    <form class="admin-form" id="player-form">
                        <div class="form-group">
                            <label for="player-name">Име на играча</label>
                            <input type="text" id="player-name" placeholder="Въведете име..." required>
                        </div>

                        <div class="form-group">
                            <label for="player-club">Клуб</label>
                            <select id="player-club" required>
                                <option value="" disabled selected>Изберете клуб...</option>
                                <option value="Barcelona">Barcelona</option>
                                <option value="Liverpool">Liverpool</option>
                                <option value="Tottenham Hotspur">Tottenham Hotspur</option>
                            </select>
                        </div>

                        <div class="form-group club-preview-container">
                            <label>Лого на избрания клуб</label>
                            <div class="club-logo-display" id="club-logo-preview">
                                <i class="fas fa-shield-alt"></i>
                                <img src="" alt="Club Logo" style="display: none;">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="player-img">Снимка на играча</label>
                            <div class="file-input-wrapper">
                                <button type="button" class="btn-file"><i class="fas fa-upload"></i> Избери снимка</button>
                                <input type="file" id="player-img" accept="image/*">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-save">Запази играча</button>
                            <a href="players.html" class="btn-cancel">Отказ</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="admin-script.js"></script>
</body>
</html>
